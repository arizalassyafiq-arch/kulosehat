name: Flutter CI/CD

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🧪 Skip Tests
        run: echo "Skip tests"

      - name: 🏗️ Build APK
        run: flutter build apk --release

      - name: 🔍 Check APK File
        run: ls -R build/app/outputs/flutter-apk/

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: 🚀 Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📢 Notify Telegram (Success)
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="✅ Build APK berhasil | Commit: ${{ github.sha }}"

      - name: 📤 Send APK to Telegram
        if: success()
        run: |
          FILE="build/app/outputs/flutter-apk/app-release.apk"

          if [ -f "$FILE" ]; then
            curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument \
              -F chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
              -F document=@$FILE \
              -F caption="📦 APK terbaru 🚀 | Commit: ${{ github.sha }}"
          else
            echo "APK file not found!"
            exit 1
          fi

      - name: ❌ Notify Telegram (Failed)
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="❌ Build gagal di GitHub Actions"