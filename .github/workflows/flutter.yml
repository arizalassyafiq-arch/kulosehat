name: Flutter CI/CD Advanced

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        flutter: [3.41.8]  # sesuaikan dengan project kamu

    steps:
      # 1. Checkout
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # 2. Setup Flutter (dynamic dari matrix)
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter }}

      # 3. Cache Dependencies (lebih optimal)
      - name: ⚡ Cache Flutter Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            build
          key: ${{ runner.os }}-flutter-${{ matrix.flutter }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-${{ matrix.flutter }}

      # 4. Install Dependencies
      - name: 📦 Install Dependencies
        run: flutter pub get

      # 5. Run Test
      - name: 🧪 Run Tests
        run: flutter test

      # 6. Build APK (release)
      - name: 🏗️ Build APK
        run: flutter build apk --release

      # 7. Debug File
      - name: 🔍 Check APK
        run: ls -R build/app/outputs/flutter-apk/

      # 8. Upload Artifact
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.flutter }}
          path: build/app/outputs/flutter-apk/app-release.apk

      # 9. Send APK ke Telegram
      - name: 📤 Send APK to Telegram
        if: success()
        run: |
          FILE="build/app/outputs/flutter-apk/app-release.apk"

          if [ -f "$FILE" ]; then
            curl -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument \
              -F chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
              -F document=@$FILE \
              -F caption="✅ APK berhasil di-build | Flutter ${{ matrix.flutter }}"
          else
            echo "APK tidak ditemukan!"
            exit 1
          fi

      # 10. Notify Failed
      - name: ❌ Notify Failed
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="❌ Build gagal di Flutter ${{ matrix.flutter }}"