name: Build Release APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (contoh: 1.0.0)'
        required: false
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build-apk:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          channel: 'stable'
          cache: true

      # 4. Flutter Doctor
      - name: Flutter Doctor
        run: flutter doctor -v

      # 5. Install Dependencies
      - name: Flutter Pub Get
        run: flutter pub get

      # 6. Analyze (optional)
      - name: Flutter Analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # 7. Build APK (split per ABI)
      - name: Build APK Release
        run: |
          flutter build apk --release --split-per-abi

      # 8. Rename APK
      - name: Rename APKs
        run: |
          VERSION="${{ github.ref_name }}"
          if [ -z "$VERSION" ] || [[ "$VERSION" == refs/heads/* ]]; then
            VERSION="v${{ github.event.inputs.version_name }}"
          fi

          mkdir -p release-apk

          for apk in build/app/outputs/flutter-apk/app-*-release.apk; do
            ARCH=$(basename "$apk" | sed -E 's/app-(.*)-release\.apk/\1/')
            cp "$apk" "release-apk/app-${VERSION}-${ARCH}.apk"
          done

          ls -lh release-apk/

      # 9. Upload Artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: release-apk/*.apk

      # 10. Create GitHub Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          files: release-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 11. Send APK ke Telegram
      - name: Send APK to Telegram
        if: success()
        run: |
          for apk in release-apk/*.apk; do
            curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument \
              -F chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
              -F document=@$apk \
              -F caption="APK Release ${{ github.ref_name }}"
          done

      # 12. Notify Failed
      - name: Notify Failed
        if: failure()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="Build gagal di GitHub Actions"